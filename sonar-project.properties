# SonarQube Cloud(SonarCloud) CI 분석 설정.
# 자동 분석(Automatic Analysis)을 끄고, 이 설정으로 CI에서 직접 분석한다.

sonar.projectKey=ggaeun324-wq_vibepilot-app
sonar.organization=ggaeun324-wq

# 분석 대상 소스(앱 코드만)
sonar.sources=src

# 테스트 파일은 "테스트"로 분류(소스 품질 점수에서 분리)
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx

# 분석에서 제외(빌드 산출물/데스크톱·스크립트/타입선언)
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.d.ts,.next/**,electron/**,scripts/**,public/**

# 커버리지 측정에서 제외(테스트·인프라·자동생성 코드)
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,electron/**,scripts/**,prisma/**,infra/**

# vitest(v8)가 생성하는 LCOV 커버리지 리포트 경로
sonar.javascript.lcov.reportPaths=coverage/lcov.info
