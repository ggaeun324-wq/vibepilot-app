name: Deploy to Azure

# main에 코드가 들어오면 자동으로 Azure에 배포한다.
# (브랜치 보호 규칙 덕분에 main에 오기 전 CI를 이미 통과한 상태)
on:
  push:
    branches: [main]

# OIDC 무비밀번호 로그인에 필요한 권한
# id-token: write 가 있어야 GitHub이 Azure에 보여줄 임시 토큰을 발급받는다.
permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-vibepilot-dev
  CONTAINER_APP: vpx4lgjps4-web
  ACR_NAME: vpx4lgjps4acr
  IMAGE_NAME: vibepilot-app

jobs:
  deploy:
    name: Build in ACR and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 비밀번호/키 없이 OIDC로 Azure 로그인 (secret엔 식별자만 저장됨)
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 빌드를 GitHub이 아니라 Azure 레지스트리(ACR) 안에서 수행한다.
      # Docker 데몬이 필요 없고, 빌드 결과가 곧바로 ACR에 저장된다.
      - name: Build image in ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ github.sha }}" \
            --image "$IMAGE_NAME:latest" \
            .

      # 새로 빌드한 이미지로 Container App을 업데이트(새 리비전 생성)한다.
      # 기존 환경변수/secret(DATABASE_URL 등)은 그대로 유지된다.
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
