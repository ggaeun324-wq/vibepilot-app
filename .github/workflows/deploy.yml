name: Deploy to Azure

# main에 코드가 들어오면 자동으로 Azure에 배포한다.
# (브랜치 보호 규칙 덕분에 main에 오기 전 CI를 이미 통과한 상태)
on:
  push:
    branches: [main]

# OIDC 무비밀번호 로그인에 필요한 권한
# id-token: write 가 있어야 GitHub이 Azure에 보여줄 임시 토큰을 발급받는다.
permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-vibepilot-dev
  CONTAINER_APP: vpx4lgjps4-web
  ACR_NAME: vpx4lgjps4acr
  IMAGE_NAME: vibepilot-app

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # 비밀번호/키 없이 OIDC로 Azure 로그인 (secret엔 식별자만 저장됨)
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 무료 체험 구독에서는 ACR Tasks(az acr build, 서버측 빌드)가 막혀 있다.
      # 그래서 GitHub 러너에 내장된 Docker로 직접 이미지를 빌드하고
      # ACR에 로그인해서 push 한다. (우리 OIDC 신원에 AcrPush 권한이 있음)
      - name: Build and push image to ACR
        run: |
          az acr login --name "$ACR_NAME"
          docker build \
            -t "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}" \
            -t "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest" \
            .
          docker push "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_NAME.azurecr.io/$IMAGE_NAME:latest"

      # 새로 빌드한 이미지로 Container App을 업데이트(새 리비전 생성)한다.
      # 기존 환경변수/secret(DATABASE_URL 등)은 그대로 유지된다.
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"
